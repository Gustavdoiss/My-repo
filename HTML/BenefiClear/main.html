<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenefiClear-Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="title">BenefiClear-Prototipo</header>
    <div class="iphone">
        <div class="notch"></div>
        <div class="tela-iphone">
            <div class="login">
                <section class="login-title">
                    <h1>BenefiClear</h1>
                    <p>0.01 alpha</p>
                </section>
                <form class="login-form">
                    <label for="register">Cadastro</label>
                    <input class="register" id="register" type="text" placeholder="Insira seu cadastro:">
                    <label for="password">Senha</label>
                    <input class="password" id="password" type="password" placeholder="Insira sua senha:">
                    <button>Entrar</button>
                </form>
            </div>
        </div>
    </div>


    <script src="behaviour.js"></script>
</body>
</html>
