<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho 2 - Modelagem</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <header>Calculadora do Método Newton-Raphson</header>
    <section class="main">
        <div class="members">
            <label for="memberN">Quantos membros seu grupo tem?</label>
            <input type="number" id="memberN" placeholder="Ex: 3">
        </div>
        <div class="matricula">
            <label for="matricula">Digite a matrícula de cada membro:</label>
            <input type="text" id="matricula" placeholder="2613284 -> Calcular! -> 2323284">
        </div>
        <button id="calculate">Calcular!</button>
        <p id="resultado"></p>
    </section>

    <script src="script.js"></script>
</body>
</html>
