<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenefiClear - Central de Telas Cerbras</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      overflow: hidden; 
      background-color: #0A0F18; /* Fundo neutro escuro para destacar as telas */
    }
    
    /* ===== MENU FIXO NO TOPO ===== */
    .master-nav {
      background-color: #1A2840;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 1000;
      border-bottom: 2px solid #2D6494;
    }
    .master-nav-title {
      font-weight: 700;
      margin-right: auto;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-nav {
      background-color: #2D6494;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-nav:hover { 
      background-color: #3A78AE; 
      transform: translateY(-1px);
    }
    .btn-nav.active { 
      background-color: #1A6840; 
      box-shadow: 0 0 0 2px #4CE880; 
    }
    
    /* ===== ÁREA DE VISUALIZAÇÃO ===== */
    .viewer-container {
      flex: 1;
      width: 100%;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background-color: #F4F6F9;
    }
  </style>
</head>

  <nav class="master-nav">

      🏭 Cerbras · Portfólio de Interfaces

    <button class="btn-nav" onclick="mudarTela('app', this)">📱 App Funcionário</button>
    <button class="btn-nav" onclick="mudarTela('totem', this)">📺 Totem Refeitório</button>
  </nav>

  <div class="viewer-container">
    <iframe id="tela-viewer" title="Visualizador de Telas"></iframe>
  </div>

    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BenefiClear Admin · Desktop · Cerbras</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;font-size:13px;color:#1A2840}

/* ===== LOGIN ===== */
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1F4E78 0%,#0D3052 100%);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity .3s}
.login-overlay.hidden{opacity:0;pointer-events:none}
.login-box{background:#fff;border-radius:18px;padding:40px;width:420px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo-icon{width:46px;height:46px;background:#1F4E78;border-radius:13px;display:flex;align-items:center;justify-content:center}
.login-title{font-size:22px;font-weight:700;color:#1F4E78}
.login-sub{font-size:12px;color:#6A7E9E;margin-top:2px}
.login-divider{font-size:10px;color:#8A9EB8;letter-spacing:.5px;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:#5A6E8A;letter-spacing:.4px;margin-bottom:5px;display:block;font-weight:500}
.form-input{width:100%;padding:11px 14px;border:1.5px solid #D8E2EE;border-radius:9px;font-size:13px;color:#1A2840;outline:none;transition:border-color .2s;background:#fff}
.form-input:focus{border-color:#1F4E78}
.btn-login{width:100%;padding:13px;background:#1F4E78;border:none;color:#fff;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
.btn-login:hover{background:#245887}
.login-note{font-size:11px;color:#8A9EB8;text-align:center;margin-top:16px}

/* ===== MAIN LAYOUT ===== */
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;background:#1F4E78;display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
.sb-brand{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:9px;display:flex;align-items:center;justify-content:center}
.sb-title{font-size:14px;font-weight:700;color:#fff}
.sb-client{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px}
.sb-nav{padding:12px 10px;flex:1;overflow-y:auto}
.sb-section{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.8px;padding:8px 10px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;color:rgba(255,255,255,.75);transition:all .15s;font-size:12.5px;font-weight:500;position:relative;margin-bottom:1px}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.active{background:rgba(255,255,255,.18);color:#fff}
.sb-item i{font-size:17px;flex-shrink:0}
.sb-badge{margin-left:auto;background:#C03A3A;color:#fff;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600}
.sb-footer{padding:14px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{display:flex;align-items:center;gap:9px;cursor:pointer}
.sb-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1A6840,#2E9960);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-un{font-size:12px;color:#fff;font-weight:500}
.sb-ur{font-size:10px;color:rgba(255,255,255,.6)}
.sb-logout{margin-left:auto;color:rgba(255,255,255,.5);cursor:pointer;font-size:14px;transition:color .15s}
.sb-logout:hover{color:#FF8080}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#F4F6F9}
.topbar{background:#fff;border-bottom:1px solid #E0E8F0;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:6px;font-size:12px;color:#8A9EB8}
.topbar-left b{color:#1A2840;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-search{display:flex;align-items:center;gap:8px;background:#F4F6F9;border:1.5px solid #E0E8F0;border-radius:9px;padding:7px 12px;width:220px;transition:border-color .2s}
.topbar-search:focus-within{border-color:#1F4E78;background:#fff}
.topbar-search input{border:none;outline:none;background:transparent;font-size:12.5px;color:#1A2840;flex:1}
.topbar-search input::placeholder{color:#8A9EB8}
.topbar-btn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#5A6E8A;background:#F4F6F9;border:1.5px solid #E0E8F0;transition:all .15s;position:relative}
.topbar-btn:hover{border-color:#1F4E78;color:#1F4E78}
.topbar-notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:#C03A3A;border-radius:50%;border:1.5px solid #fff}
.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:#C0CCE0;border-radius:5px}

/* Views */
.view{display:none}
.view.on{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Page header */
.page-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;color:#1A2840}
.page-sub{font-size:12px;color:#6A7E9E;margin-top:2px}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:16px;border:.5px solid #E0E8F0;cursor:pointer;transition:all .15s}
.kpi-card:hover{border-color:#1F4E78;transform:translateY(-1px);box-shadow:0 4px 12px rgba(31,78,120,.08)}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kpi-icon{font-size:20px}
.kpi-trend{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px}
.kpi-val{font-size:24px;font-weight:700;color:#1A2840}
.kpi-lbl{font-size:11px;color:#6A7E9E;margin-top:3px}

/* Two-col grid */
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}

/* Cards */
.card{background:#fff;border-radius:12px;border:.5px solid #E0E8F0;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:.5px solid #E8EFF5;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:#1A2840}
.card-sub{font-size:11px;color:#8A9EB8;font-weight:400}
.card-body{padding:14px 18px}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:11.5px}
.bar-row:last-child{margin-bottom:0}
.bar-label{width:100px;color:#1A2840;display:flex;align-items:center;gap:6px}
.bar-track{flex:1;height:8px;background:#EEF2F7;border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .4s ease}
.bar-val{width:40px;text-align:right;color:#6A7E9E;font-size:11px}

/* Turno cards */
.turno-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.turno-card{padding:12px;border-radius:10px;text-align:center}
.turno-lbl{font-size:9.5px;font-weight:700;letter-spacing:.5px;margin-bottom:5px}
.turno-val{font-size:22px;font-weight:700}
.turno-sub{font-size:10px;margin-top:3px;opacity:.7}

/* Activity list */
.activity-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid #E8EFF5;font-size:12px}
.activity-item:last-child{border-bottom:none}
.activity-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.activity-t{flex:1;color:#1A2840}
.activity-t b{font-weight:500}
.activity-time{color:#8A9EB8;font-size:11px;flex-shrink:0}

/* Table */
.data-table{width:100%;border-collapse:separate;border-spacing:0}
.data-table th{background:#F4F6F9;padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;color:#5A6E8A;letter-spacing:.4px;border-bottom:.5px solid #E0E8F0;white-space:nowrap}
.data-table td{padding:12px 14px;border-bottom:.5px solid #E8EFF5;font-size:12.5px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#F8FAFB}
.data-table tr{cursor:pointer}
.emp-cell{display:flex;align-items:center;gap:10px}
.emp-av-sm{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.emp-name{font-weight:500;color:#1A2840}
.emp-mat{font-size:10.5px;color:#8A9EB8;margin-top:1px;font-family:monospace}
.pill{display:inline-block;padding:2px 9px;border-radius:8px;font-size:10px;font-weight:600;white-space:nowrap}
.pill-g{background:#D4EDE0;color:#1A6840}
.pill-y{background:#FBEACB;color:#9A6610}
.pill-r{background:#FBD6DE;color:#C03A3A}
.pill-b{background:#DCEAFB;color:#1F4E78}
.ben-icons{font-size:13px;letter-spacing:1px}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #E0E8F0;border-radius:9px;padding:8px 13px;flex:1;max-width:320px;transition:border-color .2s}
.search-bar:focus-within{border-color:#1F4E78}
.search-bar input{border:none;outline:none;font-size:12.5px;color:#1A2840;flex:1;background:transparent}
.search-bar input::placeholder{color:#8A9EB8}
.btn-primary{padding:9px 16px;background:#1F4E78;color:#fff;border:none;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn-primary:hover{background:#245887;transform:translateY(-1px)}
.btn-secondary{padding:9px 14px;background:#fff;color:#3A5A7E;border:1.5px solid #D8E2EE;border-radius:9px;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn-secondary:hover{border-color:#1F4E78;color:#1F4E78}
.btn-success{padding:7px 13px;background:#1A6840;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-success:hover{background:#1E7848}
.btn-danger{padding:7px 13px;background:#fff;color:#C03A3A;border:.5px solid #FBD6DE;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-danger:hover{background:#FDF2F4}

/* Detail panel */
.detail-layout{display:grid;grid-template-columns:1fr 320px;gap:16px}
.detail-main{}
.detail-side{}
.section-title{font-size:11px;color:#5A6E8A;letter-spacing:.5px;font-weight:600;margin-bottom:10px;margin-top:16px}
.section-title:first-child{margin-top:0}
.info-rows{background:#fff;border-radius:12px;border:.5px solid #E0E8F0;overflow:hidden;margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:.5px solid #E8EFF5;font-size:12.5px}
.info-row:last-child{border-bottom:none}
.info-l{color:#6A7E9E}
.info-v{color:#1A2840;font-weight:500;text-align:right}
.info-box{border-radius:10px;padding:11px 14px;font-size:12px;line-height:1.5;margin-bottom:12px}
.info-b{background:#DCEAFB;color:#1B3E62;border-left:3px solid #1F4E78}
.info-g{background:#D4EDE0;color:#1A5030;border-left:3px solid #1A6840}
.info-y{background:#FBEACB;color:#7A4A10;border-left:3px solid #9A6610}
.info-box b{font-weight:600}

/* Cadastro steps */
.steps-bar{display:flex;align-items:center;gap:0;margin-bottom:24px}
.step-i{display:flex;align-items:center;gap:10px}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #D8E2EE;color:#8A9EB8;flex-shrink:0}
.step-circle.active{background:#1F4E78;border-color:#1F4E78;color:#fff}
.step-circle.done{background:#1A6840;border-color:#1A6840;color:#fff}
.step-lbl{font-size:12px;color:#8A9EB8;font-weight:500}
.step-lbl.active{color:#1F4E78;font-weight:600}
.step-lbl.done{color:#1A6840}
.step-line{flex:1;height:2px;background:#D8E2EE;margin:0 12px;min-width:60px}
.step-line.done{background:#1A6840}

/* Benefit toggles */
.ben-toggle{background:#fff;border:1.5px solid #E0E8F0;border-radius:11px;padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:all .15s;cursor:default}
.ben-toggle.on{border-color:#1F4E78;background:#F8FAFF}
.ben-toggle-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ben-toggle-info{flex:1}
.ben-toggle-name{font-size:13px;font-weight:600;color:#1A2840;display:flex;align-items:center;gap:8px}
.ben-toggle-sub{font-size:11px;color:#6A7E9E;margin-top:2px}
.auto-tag{font-size:9px;background:#D4EDE0;color:#1A6840;padding:1px 7px;border-radius:5px;font-weight:600}
.exc-tag{font-size:9px;background:#FBEACB;color:#9A6610;padding:1px 7px;border-radius:5px;font-weight:600}
.toggle-sw{width:40px;height:22px;background:#D0D8E8;border-radius:11px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle-sw::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.ben-toggle.on .toggle-sw{background:#1F4E78}
.ben-toggle.on .toggle-sw::after{left:20px}
.exc-box{background:#FFF3E0;border-radius:8px;padding:9px 12px;font-size:11.5px;color:#7A4A10;display:none;align-items:flex-start;gap:8px;line-height:1.5;margin-bottom:8px}
.exc-box.show{display:flex}

/* Solicitações */
.sol-row{display:grid;grid-template-columns:1fr 1fr 2fr auto;gap:14px;align-items:center;padding:14px 18px;border-bottom:.5px solid #E8EFF5;cursor:pointer;transition:background .15s}
.sol-row:hover{background:#F8FAFB}
.sol-row:last-child{border-bottom:none}
.sol-who{display:flex;align-items:center;gap:9px}
.sol-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.sol-desc{font-size:12px;color:#5A6E8A;line-height:1.4}
.sol-desc b{color:#1A2840;font-weight:500}
.sol-actions{display:flex;gap:7px;flex-shrink:0}

/* Benefit catalog */
.ben-catalog{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.ben-cat-card{background:#fff;border-radius:12px;border:.5px solid #E0E8F0;padding:16px;cursor:pointer;transition:all .15s}
.ben-cat-card:hover{border-color:#1F4E78;transform:translateY(-1px)}
.ben-cat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ben-cat-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px}
.ben-cat-n{font-size:13px;font-weight:600;color:#1A2840;margin-bottom:3px}
.ben-cat-p{font-size:11px;color:#6A7E9E}
.ben-stats{display:flex;gap:16px;padding-top:10px;border-top:.5px solid #E8EFF5}
.ben-st{flex:1}
.ben-st-l{font-size:9.5px;color:#6A7E9E;letter-spacing:.4px}
.ben-st-v{font-size:14px;font-weight:700;color:#1A2840;margin-top:2px}

/* IA */
.ia-hero{background:linear-gradient(135deg,#1F4E78,#2D6494);border-radius:14px;padding:20px;color:#fff;margin-bottom:18px;display:flex;align-items:center;gap:16px}
.ia-icon{width:52px;height:52px;background:rgba(255,255,255,.2);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.ia-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.ia-card{background:#fff;border-radius:12px;border:.5px solid #E0E8F0;padding:15px;border-left:3px solid #1F4E78}
.ia-card.warn{border-left-color:#9A6610}
.ia-card.good{border-left-color:#1A6840}
.ia-card.danger{border-left-color:#C03A3A}
.ia-tag{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:6px;margin-bottom:8px}
.ia-tag.d{background:#DCEAFB;color:#1F4E78}
.ia-tag.w{background:#FBEACB;color:#9A6610}
.ia-tag.g{background:#D4EDE0;color:#1A6840}
.ia-tag.r{background:#FBD6DE;color:#C03A3A}
.ia-title{font-size:13px;font-weight:600;color:#1A2840;margin-bottom:5px}
.ia-text{font-size:12px;color:#5A6E8A;line-height:1.5}
.ia-text b{color:#1A2840;font-weight:500}

/* Success */
.success-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center}
.success-ico{font-size:72px;margin-bottom:16px}
.success-title{font-size:24px;font-weight:700;color:#1F4E78;margin-bottom:8px}
.success-sub{font-size:13px;color:#5A6E8A;line-height:1.6;max-width:400px;margin-bottom:18px}
.success-code{background:#DCEAFB;color:#1F4E78;padding:9px 20px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:22px;display:inline-block}

/* Loading */

  solicitacoes:'vw-solicitacoes','sol-detalhe':'vw-sol-detalhe','sol-ok':'vw-sol-ok',
  ia:'vw-ia',
};
const breadcrumbs={
  dashboard:'Dashboard',colaboradores:'Colaboradores',
  'emp-jose':'Colaboradores / José Silva','emp-maria':'Colaboradores / Maria Pereira',
  'emp-antonio':'Colaboradores / Antônio Ferreira','emp-claudia':'Colaboradores / Cláudia Carvalho',
  'cad-busca':'Colaboradores / Cadastrar','cad-revisao':'Colaboradores / Cadastrar / Revisar','cad-ok':'Colaboradores / Cadastro Concluído',
  beneficios:'Benefícios',
  solicitacoes:'Solicitações','sol-detalhe':'Solicitações / Detalhe','sol-ok':'Solicitações / Aprovação',
  ia:'Análise IA',
};
const sbMap={
  dashboard:'sb-dashboard',colaboradores:'sb-colaboradores','emp-jose':'sb-colaboradores',
  'emp-maria':'sb-colaboradores','emp-antonio':'sb-colaboradores','emp-claudia':'sb-colaboradores',
  'cad-busca':'sb-colaboradores','cad-revisao':'sb-colaboradores','cad-ok':'sb-colaboradores',
  beneficios:'sb-beneficios',solicitacoes:'sb-solicitacoes','sol-detalhe':'sb-solicitacoes','sol-ok':'sb-solicitacoes',
  ia:'sb-ia',
};
function go(k){
  if(k==='login'){
    document.getElementById('login-overlay').classList.remove('hidden');
    return;
  }
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.sb-item').forEach(s=>s.classList.remove('active'));
  const id=views[k];
  if(id){
    document.getElementById(id).classList.add('on');
    document.getElementById(id).scrollIntoView?null:null;
    const sb=document.getElementById(sbMap[k]);
    if(sb) sb.classList.add('active');
    const bc=document.getElementById('breadcrumb');
    if(bc){
      const label=breadcrumbs[k]||k;
      const parts=label.split('/');
      if(parts.length===1) bc.innerHTML=`<span>Cerbras</span><i class="ti ti-chevron-right" style="font-size:12px"></i><b>${parts[0]}</b>`;
      else bc.innerHTML=`<span>Cerbras</span><i class="ti ti-chevron-right" style="font-size:12px"></i><span style="cursor:pointer" onclick="go('${parts[0].trim().toLowerCase()}')">${parts[0].trim()}</span><i class="ti ti-chevron-right" style="font-size:12px"></i><b>${parts[parts.length-1].trim()}</b>`;
    }
    const content=document.querySelector('.content');
    if(content) content.scrollTop=0;
  }
}
function doLogin(){
  document.getElementById('login-overlay').classList.add('hidden');
  go('dashboard');
}
function cadBuscar(){
  const v=document.getElementById('cad-mat').value.trim();
  const load=document.getElementById('cad-load');
  const err=document.getElementById('cad-err');
  err.classList.remove('show');
  load.style.display='flex';
  document.getElementById('cad-mat').style.borderColor='';
  setTimeout(()=>{
    load.style.display='none';
    if(!v||v.length<5||v==='99999'){
      err.classList.add('show');
      document.getElementById('cad-mat').style.borderColor='#C03A3A';
    } else go('cad-revisao');
  },900);
}
function togBen(id){
  const el=document.getElementById(id);
  el.classList.toggle('on');
}
function togBenExc(id,excId){
  const el=document.getElementById(id);
  el.classList.toggle('on');
  document.getElementById(excId).classList.toggle('show',el.classList.contains('on'));
}
function aprovar(btn){
  const row=btn.closest('.sol-row');
  if(!row) return;
  row.style.opacity='.4';
  row.style.pointerEvents='none';
  row.querySelector('.sol-actions').innerHTML='<span style="color:#1A6840;font-size:12px;font-weight:600">✓ Aprovado</span>';
}
function negar(btn){
  const row=btn.closest('.sol-row');
  if(!row) return;
  row.style.opacity='.4';
  row.style.pointerEvents='none';
  row.querySelector('.sol-actions').innerHTML='<span style="color:#C03A3A;font-size:12px;font-weight:600">✕ Negado</span>';
}
</script>
</body>
</html>

.chip:hover{border-color:#1A6840;color:#1A6840}
.chat-in{background:#fff;border-top:.5px solid #DDE8E0;padding:10px 13px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.chat-inp{flex:1;height:36px;background:#F2F6F3;border:1.5px solid #DDE8E0;border-radius:20px;padding:0 14px;font-size:12.5px;outline:none;color:#1A2820}
.chat-inp:focus{border-color:#1A6840}
.chat-snd{width:36px;height:36px;background:#1A6840;border:none;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}

/* Perfil */
.perf-hero{background:linear-gradient(135deg,#1A6840,#2E9960,#1A5C38);border-radius:16px;padding:16px;margin-bottom:14px}
.perf-av{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px;border:2.5px solid rgba(255,255,255,.4);margin:0 auto 10px}
.perf-n{font-size:16px;font-weight:600;color:#fff;text-align:center}
.perf-r{font-size:11px;color:rgba(255,255,255,.85);text-align:center;margin-top:2px}
.perf-mat{background:rgba(255,255,255,.2);padding:3px 12px;border-radius:10px;font-size:10px;color:#fff;display:block;width:fit-content;margin:6px auto 0}
.perf-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.perf-stat{background:#fff;border-radius:12px;padding:10px;text-align:center;border:.5px solid #DDE8E0}
.perf-sv{font-size:17px;font-weight:700;color:#1A6840}
.perf-sl{font-size:9.5px;color:#6A7E70;margin-top:2px}
.perf-block{background:#fff;border-radius:13px;border:.5px solid #DDE8E0;overflow:hidden;margin-bottom:10px}
.perf-item{display:flex;align-items:center;padding:11px 13px;border-bottom:.5px solid #E8F0E8;cursor:pointer;gap:10px}
.perf-item:last-child{border-bottom:none}
.perf-item:hover{background:#F8FAF8}
.perf-i-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.perf-i-l{font-size:10px;color:#6A7E70}
.perf-i-v{font-size:12.5px;font-weight:500;color:#1A2820;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.perf-i-lbl{flex:1;font-size:13px;color:#1A2820}
.perf-tog{width:36px;height:20px;background:#1A6840;border-radius:10px;position:relative;flex-shrink:0;transition:background .2s;cursor:pointer}
.perf-tog::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;right:2px;transition:right .2s}
.perf-tog.off{background:#D3D1C7}
.perf-tog.off::after{right:auto;left:2px}
.perf-logout{width:100%;padding:13px;background:#fff;border:1.5px solid #FBD6DE;color:#C03A3A;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px}

function go(k){

}

/* Kiosk shell */
.kiosk{width:440px;background:linear-gradient(180deg,#2A2A2A 0%,#1A1A1A 100%);border-radius:24px 24px 8px 8px;padding:12px 12px 0;box-shadow:0 30px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05)}
.kiosk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px}
.kiosk-cam{width:10px;height:10px;background:#333;border-radius:50%;border:2px solid #444}
.kiosk-model{font-size:9px;color:#3A3A3A;letter-spacing:1px}
.kiosk-led{width:8px;height:8px;background:#1A6840;border-radius:50%;box-shadow:0 0 6px #1A6840}

.screen{width:100%;height:680px;background:#0A1410;border-radius:12px 12px 0 0;overflow:hidden;display:flex;flex-direction:column;position:relative}

.stand-top{width:200px;height:12px;background:#222;border-radius:0 0 4px 4px;margin:0 auto}
.stand-pole{width:40px;height:120px;background:linear-gradient(180deg,#2A2A2A,#1A1A1A);margin:0 auto;border-radius:0 0 4px 4px}
.stand-base{width:240px;height:18px;background:linear-gradient(180deg,#222,#1A1A1A);border-radius:8px;margin:0 auto}

/* All screens */
.sc{display:none;flex-direction:column;height:100%;animation:fadeIn .2s ease}
.sc.on{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Header bar */
.hbar{background:#1A6840;padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hbar-brand{display:flex;align-items:center;gap:10px}
.hbar-icon{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:9px;display:flex;align-items:center;justify-content:center}
.hbar-n{font-size:16px;font-weight:700;color:#fff}
.hbar-loc{font-size:9.5px;color:rgba(255,255,255,.65);letter-spacing:.6px;text-align:right;line-height:1.5}
.hbar-back{width:38px;height:38px;background:rgba(255,255,255,.15);border:none;border-radius:9px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.hbar-back:hover{background:rgba(255,255,255,.25)}
.hbar-title{font-size:16px;font-weight:700;color:#fff;flex:1;margin-left:10px}
.hbar-home{width:34px;height:34px;background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* Body */
.body{flex:1;overflow-y:auto;padding:20px}
.body::-webkit-scrollbar{width:4px}
.body::-webkit-scrollbar-track{background:transparent}
.body::-webkit-scrollbar-thumb{background:#1A3A28;border-radius:4px}

/* Footer */
.foot{padding:12px 20px;border-top:1px solid #0F2A1A;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.foot-time{font-size:11px;color:#2A5A38}
.foot-logout{background:none;border:1.5px solid #2A1A1A;color:#FF6B6B;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.foot-logout:hover{background:#1A0A0A}

/* ===== LOGIN ===== */
.login-greet{text-align:center;margin-bottom:24px}
.login-greet .ico{font-size:48px;margin-bottom:12px;display:block}
.login-greet h2{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px}
.login-greet p{font-size:13px;color:#3A6A50;line-height:1.5}
.mat-field{background:#0F2A1A;border:2px solid #1A3A28;border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:12px;margin-bottom:18px;transition:border-color .2s}
.mat-field.err{border-color:#8A2A1A;background:#1A0A0A}
.mat-num{flex:1;font-size:28px;font-weight:700;color:#fff;letter-spacing:8px;font-family:'Courier New',monospace;min-height:36px}
.mat-del{background:none;border:none;color:#3A6A50;font-size:16px;cursor:pointer;padding:4px}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.key{background:#0F2A1A;border:2px solid #1A3A28;color:#fff;font-size:28px;font-weight:700;padding:18px;border-radius:12px;cursor:pointer;text-align:center;transition:all .12s;user-select:none}
.key:hover{background:#152E1E;border-color:#2A4A38;transform:scale(.97)}
.key:active{transform:scale(.94)}
.key.zero{grid-column:2}
.key.action{background:#0F2218;border-color:#1A3228;color:#3A6A50;font-size:16px}
.btn-enter{width:100%;padding:18px;background:#1A6840;border:none;color:#fff;font-size:18px;font-weight:700;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:.5px;transition:all .15s}
.btn-enter:hover{background:#1E7848;transform:translateY(-1px)}
.login-clock{text-align:center;color:#1E4A30;font-size:11.5px;margin-top:14px}

/* ===== HOME ===== */
.welcome-bar{background:#0F2A1A;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:20px}
.w-av{width:48px;height:48px;border-radius:50%;background:#1A6840;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
.w-name{font-size:18px;font-weight:700;color:#fff}
.w-role{font-size:11.5px;color:#3A6A50;margin-top:2px}
.w-tags{display:flex;gap:6px;margin-top:6px}
.w-tag{padding:3px 10px;border-radius:14px;font-size:10px;font-weight:600}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mbtn{background:#0F2A1A;border:2px solid #1A3A28;border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .18s;width:100%}
.mbtn:hover{border-color:#1A6840;background:#112A1A;transform:translateY(-2px)}
.mbtn:active{transform:translateY(0);opacity:.85}
.mbtn.green{background:#1A6840;border-color:#2A8850}
.mbtn.green:hover{background:#1E7848}
.mbtn .mico{font-size:38px;display:block;margin-bottom:10px}
.mbtn .mlbl{font-size:16px;font-weight:700;color:#fff;display:block}
.mbtn .msub{font-size:11px;color:#3A6A50;display:block;margin-top:4px}
.mbtn.green .msub{color:rgba(255,255,255,.65)}

/* ===== BENEFICIOS LIST ===== */
.ben-title{font-size:13px;color:#3A6A50;letter-spacing:.5px;margin-bottom:14px}
.ben-card{background:#0F2A1A;border:2px solid #1A3A28;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.ben-card:hover{border-color:#1A6840;background:#112A1A;transform:translateX(4px)}
.ben-card:active{transform:translateX(2px)}
.ben-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ben-info{flex:1;min-width:0}
.ben-n{font-size:15px;font-weight:600;color:#fff}
.ben-s{font-size:11.5px;color:#3A6A50;margin-top:3px}
.ben-pill{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.ben-arr{color:#1A4A2A;font-size:20px}

/* ===== DETAIL ===== */
.det-head{background:#0F2A1A;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:18px}
.det-h-ico{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.det-h-n{font-size:18px;font-weight:700;color:#fff}
.det-h-s{font-size:12px;color:#3A6A50;margin-top:3px}
.det-rows{background:#0F2A1A;border-radius:14px;overflow:hidden;margin-bottom:14px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #0A1E14;font-size:14px}
.det-row:last-child{border-bottom:none}
.det-rl{color:#3A6A50}
.det-rv{color:#fff;font-weight:600;text-align:right;max-width:55%}
.pill-ok{background:#1A6840;color:#4CE880;padding:3px 12px;border-radius:10px;font-size:11px;font-weight:600}
.info-box{background:#0F2218;border:1.5px solid #1A4A28;border-radius:12px;padding:12px 14px;font-size:12.5px;color:#3A7A50;line-height:1.6;margin-bottom:14px}
.info-box b{color:#4CB870;font-weight:600}
.btn-action{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:all .15s}
.btn-action:hover{transform:translateY(-2px)}
.btn-green{background:#1A6840;color:#fff}
.btn-outline{background:transparent;border:2px solid #1A3A28;color:#3A6A50}
.btn-outline:hover{border-color:#1A6840;color:#fff;background:#112A1A}

/* ===== HOLERITE ===== */
.hol-header{background:#0F2A1A;border-radius:14px;padding:14px 16px;margin-bottom:14px;text-align:center}
.hol-hero{background:linear-gradient(135deg,#1A6840,#2E9960);border-radius:14px;padding:18px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.hol-hero::after{content:'💰';position:absolute;right:-10px;bottom:-10px;font-size:80px;opacity:.1}
.hol-hero-l{font-size:11px;color:rgba(255,255,255,.75);letter-spacing:.5px;margin-bottom:4px}
.hol-hero-v{font-size:32px;font-weight:700;color:#fff;letter-spacing:-1px}
.hol-hero-t{background:rgba(255,255,255,.18);display:inline-block;padding:3px 12px;border-radius:10px;font-size:11px;color:#fff;margin-top:8px}
.hol-group{background:#0F2A1A;border-radius:14px;overflow:hidden;margin-bottom:10px}
.hol-gh{padding:10px 16px;font-size:11px;font-weight:600;letter-spacing:.4px;border-bottom:1px solid #0A1E14}
.hol-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #0A1E14;font-size:13px}
.hol-row:last-child{border-bottom:none}
.hol-rl{color:#3A6A50;display:flex;align-items:center;gap:7px}
.hol-rv-pos{color:#4CE880;font-weight:600}
.hol-rv-neg{color:#FF8080;font-weight:600}
.hol-tag{background:#1A3A28;color:#3A7A50;font-size:9px;padding:1px 6px;border-radius:5px;font-weight:600}
.hol-tot{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#0F2218;border-radius:14px;font-size:15px;font-weight:700;color:#fff;margin-bottom:14px}
.hol-tot-v{font-size:22px;color:#4CE880}

/* ===== SOLICITAR ===== */
.sol-title{font-size:13px;color:#3A6A50;letter-spacing:.5px;margin-bottom:14px}
.sol-opt{background:#0F2A1A;border:2px solid #1A3A28;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.sol-opt:hover{border-color:#1A6840;background:#112A1A;transform:translateX(4px)}
.sol-opt-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.sol-opt-n{font-size:15px;font-weight:600;color:#fff}
.sol-opt-s{font-size:11.5px;color:#3A6A50;margin-top:3px}

/* ===== FORMS ===== */
.form-group{margin-bottom:16px}
.form-lbl{font-size:12px;color:#3A6A50;letter-spacing:.4px;margin-bottom:7px;display:block}
.form-inp{width:100%;background:#0F2A1A;border:2px solid #1A3A28;border-radius:12px;padding:14px 16px;font-size:16px;color:#fff;outline:none;transition:border-color .2s}
.form-inp:focus{border-color:#1A6840}
.form-sel{width:100%;background:#0F2A1A;border:2px solid #1A3A28;border-radius:12px;padding:14px 16px;font-size:15px;color:#fff;outline:none;appearance:none}
.form-sel option{background:#0F2A1A}
.rota-card{background:#0F2A1A;border:2px solid #1A3A28;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.rota-card:hover{border-color:#1A6840}
.rota-card.sel{border-color:#1A6840;background:#112A1A}
.rota-card.sel .rc-n{color:#4CE880}
.rc-num{width:38px;height:38px;background:#1A3A28;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.rc-n{font-size:14px;font-weight:600;color:#fff}
.rc-s{font-size:11px;color:#3A6A50;margin-top:2px}
.success-screen{text-align:center;padding:30px 20px}
.success-ico{font-size:64px;margin-bottom:16px;display:block}
.success-t{font-size:22px;font-weight:700;color:#4CE880;margin-bottom:8px}
.success-s{font-size:13px;color:#3A6A50;line-height:1.6;margin-bottom:24px}

/* ===== IA CHAT ===== */
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.bub{max-width:82%;padding:12px 14px;font-size:13.5px;line-height:1.5}
.bub.bot{background:#0F2A1A;border:1.5px solid #1A3A28;border-radius:4px 16px 16px 16px;color:#B0D8B8;align-self:flex-start}
.bub.usr{background:#1A6840;color:#fff;border-radius:16px 4px 16px 16px;align-self:flex-end}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{padding:8px 14px;border:1.5px solid #1A3A28;border-radius:20px;font-size:12px;color:#3A7A50;cursor:pointer;background:#0F2A1A;transition:all .15s}
.chip:hover{border-color:#1A6840;color:#4CB870;background:#112A1A}
.chat-in{background:#0A1410;border-top:1px solid #0F2A1A;padding:12px 16px;display:flex;gap:10px;align-items:center;flex-shrink:0}
.chat-inp{flex:1;background:#0F2A1A;border:2px solid #1A3A28;border-radius:24px;padding:12px 18px;font-size:14px;color:#fff;outline:none}
.chat-inp::placeholder{color:#1E4A30}
.chat-inp:focus{border-color:#1A6840}
.chat-snd{width:44px;height:44px;background:#1A6840;border:none;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
</style>
</head>

<script>
function go(id){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  // scroll to top
  const b=document.getElementById(id).querySelector('.body');
  if(b) b.scrollTop=0;
}
// Numpad
let mat='';
function tNum(n){if(mat.length<8){mat+=n;upd();}}
function tDel(){mat=mat.slice(0,-1);upd();}
function tClear(){mat='';upd();}
function upd(){
  const s=mat.padEnd(8,'_').split('').join(' ');
  document.getElementById('mat-display').textContent=s;
  document.getElementById('mat-field').classList.remove('err');
}
function tLogin(){
  if(mat.length>=6) go('sc-home');
  else {
    document.getElementById('mat-field').classList.add('err');
    document.getElementById('mat-display').textContent='INVÁLIDA!';
    setTimeout(()=>{mat='';upd();},1200);
  }
}
function tLogout(){mat='';upd();go('sc-login');}

// Rota select
function selectRota(el){
  document.querySelectorAll('.rota-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

// Chat
const resps={
  'qual o saldo do meu va?':'Seu VA (Ticket) está com saldo de <strong>R$ 500,00</strong>, creditado no dia 01/06. Lembre: use em supermercados e padarias credenciadas!',
  'onde usar minha carteirinha?':'Sua carteirinha Hapvida (00089234-001) é aceita em qualquer clínica ou hospital credenciado pela Hapvida no Brasil. A mais próxima: Hospital Hapvida Maracanaú, R. Paracuru, 100.',
  'quando recebo a plr?':'A PLR 2025 está prevista para <strong>Abril/2026</strong>. Com base nas metas atuais (92% atingidas), a estimativa é de <strong>1,8× seu salário base</strong>. O valor exato sai após a apuração em março.',
};
const fallback='Entendi! Vou verificar isso para você. 📋 Sua dúvida foi registrada e um especialista do RH responderá em breve, ou você pode solicitar pelo menu <strong>Solicitar</strong>.';
function sendMsg(txt){
  const b=document.getElementById('chat-msgs');
  const u=document.createElement('div');u.className='bub usr';u.innerHTML=txt;b.appendChild(u);
  setTimeout(()=>{
    const a=document.createElement('div');a.className='bub bot';
    a.innerHTML=resps[txt.toLowerCase()]||fallback;
    b.appendChild(a);b.scrollTop=b.scrollHeight;
  },500);
  b.scrollTop=b.scrollHeight;
}
function sendFromInput(){
  const i=document.getElementById('chat-inp');
  if(!i.value.trim())return;
  sendMsg(i.value.trim());i.value='';
}
</script>
</body>
</html>

    <script>
    function mudarTela(id, btnElement) {
      try {
        // 1. Atualiza a cor dos botões do menu superior
        document.querySelectorAll('.btn-nav').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        // 2. Extrai o código bruto de dentro do textarea (sem perder a tag body!)
        const rawHtml = document.getElementById('code-' + id).value;

        // 3. Injeta diretamente no iframe
        const iframe = document.getElementById('tela-viewer');
        iframe.srcdoc = rawHtml;
      } catch (e) {
        console.error("Erro ao tentar mudar de tela: ", e);
      }
    }

    // Carrega automaticamente a primeira tela ao abrir o arquivo
    window.addEventListener('DOMContentLoaded', () => {
      const btnPrimeiro = document.querySelector('.btn-nav');
      if (btnPrimeiro) {
        mudarTela('desktop', btnPrimeiro);
      }
    });
  </script>
